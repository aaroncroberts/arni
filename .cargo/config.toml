# Cargo build configuration
# See: https://doc.rust-lang.org/cargo/reference/config.html

[build]
# Limits incremental compilation to the workspace crates only. Avoids re-running
# build scripts for dependencies that haven't changed.
incremental = true

# ── DuckDB system library (replaces the old "bundled" compile-from-source) ────
# DuckDB no longer uses features = ["bundled"]. Instead, it links against the
# system-installed libduckdb.dylib / libduckdb.so.
#
# Dev setup (run once):
#   macOS:  brew install duckdb
#   Linux:  see https://duckdb.org/docs/installation
#
# If you have DuckDB installed somewhere non-standard, override these:
#   export DUCKDB_LIB_DIR=/path/to/your/lib
#   export DUCKDB_INCLUDE_DIR=/path/to/your/include
#
# force = false means any explicit env var wins over this default.
[env]
DUCKDB_LIB_DIR     = { value = "/opt/homebrew/lib",     force = false }
DUCKDB_INCLUDE_DIR = { value = "/opt/homebrew/include", force = false }
# Intel Mac / Linux override example:
#   DUCKDB_LIB_DIR = { value = "/usr/local/lib", force = false }

[net]
retry = 2

# ── macOS (Apple Silicon) ─────────────────────────────────────────────────────
# split-debuginfo is set in Cargo.toml [profile.*], which is the canonical
# location. The RUSTFLAGS below are a safety net for any tool that bypasses
# the profile (e.g. cargo-watch, some IDEs).
[target.aarch64-apple-darwin]
# No alternate linker needed on Apple Silicon — the system ld is fast.
# If mold or lld is installed in future, add:
#   linker = "mold"
#   rustflags = ["-C", "link-arg=-fuse-ld=mold"]

[target.x86_64-apple-darwin]
# Same as above for Intel Macs.

# ── Linux (CI) ────────────────────────────────────────────────────────────────
# Uncomment if mold is available in CI:
# [target.x86_64-unknown-linux-gnu]
# linker = "clang"
# rustflags = ["-C", "link-arg=-fuse-ld=mold"]

# ── cargo-nextest (faster test execution) ─────────────────────────────────────
# Install with: cargo install cargo-nextest
# Run with:     cargo nextest run
# Nextest compiles all test binaries first, then runs them in parallel.
# Significantly faster than `cargo test` for multi-crate workspaces.
# See: https://nexte.st
