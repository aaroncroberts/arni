version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: arni-dev-postgres
    environment:
      POSTGRES_USER: test_user
      POSTGRES_PASSWORD: test_password
      POSTGRES_DB: test_db
    ports:
      - "5432:5432"
    volumes:
      - ~/.arni/data/postgres:/var/lib/postgresql/data
      - ./scripts/init-postgres.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U test_user -d test_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  mysql:
    image: mysql:8.0
    container_name: arni-dev-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: test_db
      MYSQL_USER: test_user
      MYSQL_PASSWORD: test_password
    ports:
      - "3306:3306"
    volumes:
      - ~/.arni/data/mysql:/var/lib/mysql
      - ./scripts/init-mysql.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "test_user", "-ptest_password"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  mssql:
    image: mcr.microsoft.com/azure-sql-edge:latest
    container_name: arni-dev-mssql
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "Test_Password123!"
      MSSQL_PID: "Developer"
    ports:
      - "1434:1433"
    volumes:
      - ~/.arni/data/mssql:/var/opt/mssql
      - ./scripts/init-mssql.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools/bin/sqlcmd -S localhost -U sa -P Test_Password123! -Q 'SELECT 1' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  oracle:
    image: container-registry.oracle.com/database/free:latest
    container_name: arni-dev-oracle
    environment:
      ORACLE_PWD: test_password
      ORACLE_CHARACTERSET: AL32UTF8
    ports:
      - "1522:1521"
      - "5501:5500"
    volumes:
      - ~/.arni/data/oracle:/opt/oracle/oradata
      - ./scripts/init-oracle.sql:/opt/oracle/scripts/startup/init.sql
    healthcheck:
      test: ["CMD-SHELL", "echo 'SELECT 1 FROM DUAL;' | sqlplus -s system/test_password@localhost:1521/FREE || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 60s
    restart: unless-stopped
    shm_size: 2gb

  mongodb:
    image: mongo:7
    container_name: arni-dev-mongodb
    environment:
      MONGO_INITDB_ROOT_USERNAME: test_user
      MONGO_INITDB_ROOT_PASSWORD: test_password
      MONGO_INITDB_DATABASE: test_db
    ports:
      - "27018:27017"
    volumes:
      - ~/.arni/data/mongodb:/data/db
      - ./scripts/init-mongodb.js:/docker-entrypoint-initdb.d/init.js
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
