# Example Arni Configuration File (TOML format)
# 
# This file demonstrates how to configure database connections
# for different database types supported by Arni.

# PostgreSQL connection
[profiles.postgres_local]
type = "postgres"
host = "localhost"
port = 5432
database = "mydb"
username = "postgres"
password = "secret"

[profiles.postgres_prod]
type = "postgres"
host = "prod.example.com"
port = 5432
database = "production_db"
username = "app_user"
password = "${POSTGRES_PASSWORD}"  # Use environment variables

# MongoDB connection
[profiles.mongo_local]
type = "mongodb"
uri = "mongodb://localhost:27017"
database = "mydb"

[profiles.mongo_atlas]
type = "mongodb"
uri = "mongodb+srv://user:pass@cluster.mongodb.net"
database = "production"

# Oracle connection
[profiles.oracle_prod]
type = "oracle"
connection_string = "user/pass@//host:1521/service"

# SQL Server connection
[profiles.mssql_local]
type = "mssql"
host = "localhost"
port = 1433
database = "mydb"
username = "sa"
password = "YourStrong@Passw0rd"

# DuckDB connection (file-based)
[profiles.duckdb_local]
type = "duckdb"
path = "./data/analytics.duckdb"

# DuckDB in-memory
[profiles.duckdb_memory]
type = "duckdb"
path = ":memory:"
